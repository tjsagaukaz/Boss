version = 1

[mode]
default = "agent"
allow_explicit_override = true

[permissions]
default_policy = "prompt"
respect_bossignore = true
announce_restricted_actions = true

[indexing]
respect_bossindexignore = true
include_boss_control_files = false

[memory]
auto_injection = true
auto_distillation = true
auto_approve = false
auto_approve_min_confidence = 0.98

[jobs]
branch_behavior = "suggest"
takeover_cancels_background = true

[review]
mode_name = "review"
findings_first = true
require_file_references = true
auto_activate = true

[runner]
default_profile = "workspace_write"
network_enabled = false
# domain_allowlist = ["api.openai.com"]
# writable_roots = []
# env_scrub_keys = []

[runner.mode_profiles]
ask = "read_only"
plan = "read_only"
review = "read_only"
agent = "workspace_write"

[runner.commands]
# allowed_prefixes = []
# prompt_prefixes = []
# denied_prefixes = []
auto_mode_keywords = [
  "review",
  "code review",
  "audit",
  "security review",
  "architecture review",
]

# ── Provider configuration ──────────────────────────────────────────

[providers.openai]
enabled = true
api_key_env = "OPENAI_API_KEY"
# capabilities = ["chat", "streaming", "vision", "embeddings", "tool_use"]

[providers.ollama]
enabled = false
base_url = "http://localhost:11434"
# capabilities = ["chat", "streaming"]
# models = ["qwen3:8b", "qwen3:14b"]

[routing]
chat = "openai"
reasoning = "openai"
embeddings = "openai"
vision = "openai"
fallback = "ollama"
